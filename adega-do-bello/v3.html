<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Adega do Bello - v3</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          display: ['Anton', 'sans-serif'],
          sans: ['Inter', 'system-ui', 'sans-serif'],
        },
        colors: {
          night: '#06060b',
          carbon: '#101018',
          lime: '#c8ff2f',
          pink: '#ff2f7a',
          amber: '#ffb21f',
        },
      },
    },
  };
</script>
<style>
  :root { color-scheme: dark; }
  html, body { min-height: 100%; background: #06060b; }
  body { -webkit-font-smoothing: antialiased; }

  .party-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    pointer-events: none;
  }

  .party-bg::before {
    content: '';
    position: absolute;
    inset: -5%;
    background: url('bg/party.avif') center / cover no-repeat;
    filter: blur(3px) saturate(1.05);
    opacity: .24;
    transform: scale(1.06);
  }

  .party-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(80% 52% at 50% 0%, rgba(255, 47, 122, .22), transparent 62%),
      radial-gradient(70% 45% at 92% 18%, rgba(200, 255, 47, .16), transparent 58%),
      linear-gradient(180deg, rgba(6, 6, 11, .45), rgba(6, 6, 11, .82) 55%, #06060b 100%);
  }

  #cup-stage {
    touch-action: none;
  }
</style>
</head>
<body class="font-sans text-white">
  <div class="party-bg" aria-hidden="true"></div>

  <main class="relative z-10 mx-auto min-h-screen w-full max-w-[480px] px-5 pb-12">
    <header class="flex h-20 items-center justify-center">
      <p class="font-display text-[28px] leading-none tracking-wide text-white">
        Adega do Bello
      </p>
    </header>

    <section class="flex min-h-[calc(100vh-5rem)] items-center justify-center pb-16">
      <div id="cup-stage" class="h-[520px] w-full max-w-[420px]"></div>
    </section>
  </main>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.165.0/build/three.module.js';

    const stage = document.getElementById('cup-stage');
    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(36, 1, 0.1, 100);
    camera.position.set(0, 1.2, 7.2);

    const renderer = new THREE.WebGLRenderer({
      alpha: true,
      antialias: true,
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    stage.appendChild(renderer.domElement);

    const cup = new THREE.Group();
    scene.add(cup);

    const glassMaterial = new THREE.MeshPhysicalMaterial({
      color: 0xf7fbff,
      roughness: 0.08,
      metalness: 0,
      transmission: 0.72,
      thickness: 0.28,
      transparent: true,
      opacity: 0.34,
      ior: 1.42,
      side: THREE.DoubleSide,
      depthWrite: false,
    });

    const rimMaterial = new THREE.MeshPhysicalMaterial({
      color: 0xffffff,
      roughness: 0.14,
      metalness: 0,
      transmission: 0.38,
      thickness: 0.1,
      transparent: true,
      opacity: 0.58,
      side: THREE.DoubleSide,
    });

    const iceMaterial = new THREE.MeshPhysicalMaterial({
      color: 0xff3f78,
      roughness: 0.18,
      metalness: 0,
      transmission: 0.58,
      thickness: 0.2,
      transparent: true,
      opacity: 0.72,
      ior: 1.31,
      side: THREE.DoubleSide,
    });

    const whiskyMaterial = new THREE.MeshPhysicalMaterial({
      color: 0xc76a16,
      roughness: 0.18,
      metalness: 0,
      transmission: 0.18,
      thickness: 0.16,
      transparent: true,
      opacity: 0.72,
      ior: 1.36,
      side: THREE.DoubleSide,
      depthWrite: false,
    });

    const whiskySurfaceMaterial = new THREE.MeshBasicMaterial({
      color: 0xf0a23a,
      transparent: true,
      opacity: 0.38,
      side: THREE.DoubleSide,
      depthWrite: false,
    });

    const bodyGeometry = new THREE.CylinderGeometry(0.86, 0.48, 2.85, 96, 1, true);
    const body = new THREE.Mesh(bodyGeometry, glassMaterial);
    body.position.y = -0.1;
    cup.add(body);

    const topRim = new THREE.Mesh(
      new THREE.TorusGeometry(0.86, 0.035, 16, 128),
      rimMaterial,
    );
    topRim.position.y = 1.325;
    topRim.rotation.x = Math.PI / 2;
    cup.add(topRim);

    const lowerRim = new THREE.Mesh(
      new THREE.TorusGeometry(0.48, 0.024, 12, 96),
      rimMaterial,
    );
    lowerRim.position.y = -1.525;
    lowerRim.rotation.x = Math.PI / 2;
    cup.add(lowerRim);

    const base = new THREE.Mesh(
      new THREE.CylinderGeometry(0.48, 0.42, 0.075, 96),
      rimMaterial,
    );
    base.position.y = -1.56;
    cup.add(base);

    const iceBar = new THREE.Mesh(
      new THREE.BoxGeometry(0.46, 1.72, 0.34, 4, 10, 4),
      iceMaterial,
    );
    iceBar.position.set(0.24, -0.28, 0.05);
    cup.add(iceBar);

    const whisky = new THREE.Mesh(
      new THREE.CylinderGeometry(0.56, 0.43, 0.5, 96, 1, false),
      whiskyMaterial,
    );
    whisky.position.y = -1.275;
    cup.add(whisky);

    const whiskySurface = new THREE.Mesh(
      new THREE.CylinderGeometry(0.565, 0.565, 0.012, 96),
      whiskySurfaceMaterial,
    );
    whiskySurface.position.y = -1.02;
    cup.add(whiskySurface);

    const shadow = new THREE.Mesh(
      new THREE.CircleGeometry(1.3, 96),
      new THREE.MeshBasicMaterial({
        color: 0x000000,
        transparent: true,
        opacity: 0.24,
        depthWrite: false,
      }),
    );
    shadow.position.y = -1.74;
    shadow.rotation.x = -Math.PI / 2;
    scene.add(shadow);

    scene.add(new THREE.AmbientLight(0xffffff, 1.25));

    const pink = new THREE.PointLight(0xff2f7a, 4.5, 9);
    pink.position.set(-2.8, 2.4, 3.8);
    scene.add(pink);

    const lime = new THREE.PointLight(0xc8ff2f, 3.2, 8);
    lime.position.set(2.4, 1.2, 3.4);
    scene.add(lime);

    const white = new THREE.DirectionalLight(0xffffff, 1.7);
    white.position.set(0, 3, 4);
    scene.add(white);

    function resize() {
      const width = stage.clientWidth;
      const height = stage.clientHeight;

      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      renderer.setSize(width, height, false);
    }

    window.addEventListener('resize', resize);
    resize();

    function render() {
      renderer.render(scene, camera);
    }

    cup.rotation.y = -0.12;
    cup.rotation.x = 0.02;
    render();
  </script>
</body>
</html>
